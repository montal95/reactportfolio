services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Development service with volume-mounted dependencies
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - ${NODE_MODULES_PATH:-node_modules}:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
    command: sh -c "npm install && npm start"
    profiles:
      - dev

  # Test service for running tests
  test:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - ${NODE_MODULES_PATH:-node_modules}:/app/node_modules
    environment:
      - CI=true
      - NODE_OPTIONS=--openssl-legacy-provider
    command: sh -c "npm install && npm test -- --watchAll=false"
    profiles:
      - test

  # Build service for creating production build
  build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - ${NODE_MODULES_PATH:-node_modules}:/app/node_modules
    environment:
      - CI=true
      - NODE_OPTIONS=--openssl-legacy-provider
    command: sh -c "npm install && npm run build"
    profiles:
      - build

volumes:
  node_modules:
