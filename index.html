<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta
      name="description"
      content="Sam Montalvo Jr — Full-stack software engineer in Chicago specializing in Ruby on Rails, React, and legacy system modernization."
    />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sam Montalvo Jr — Software Engineer" />
    <meta property="og:description" content="Full-stack software engineer in Chicago specializing in Ruby on Rails, React, and legacy system modernization." />
    <meta property="og:url" content="https://www.sammontalvojr.com/" />
    <meta property="og:image" content="https://www.sammontalvojr.com/images/Sam-Montalvo.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sam Montalvo Jr — Software Engineer" />
    <meta name="twitter:description" content="Full-stack software engineer in Chicago specializing in Ruby on Rails, React, and legacy system modernization." />
    <meta name="twitter:image" content="https://www.sammontalvojr.com/images/Sam-Montalvo.png" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Sam Montalvo Jr — Software Engineer</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Netlify form detection — mirrors Contact.js field names -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="website" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="website" />
    </form>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
